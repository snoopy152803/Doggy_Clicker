        { id: "a7", title: "The End?", th: 1e21, un: false }
    ];

    if(typeof firebase!=='undefined'){ try{firebase.initializeApp(firebaseConfig); db=firebase.firestore(); auth=firebase.auth(); auth.onAuthStateChanged(u=>{ if(u){ user=u; document.getElementById('login-btn').style.display='none'; document.getElementById('user-display').style.display='flex'; document.getElementById('username').innerText=u.displayName.split(' ')[0]; checkAdmin(); load(); initChat(); } else { document.getElementById('loader').style.display='none'; document.getElementById('game-ui').style.opacity='1'; } }); }catch(e){console.error(e);} }

    setTimeout(() => { if(document.getElementById('loader').style.display !== 'none') { document.getElementById('loader-msg').innerText = "CONNECTION SLOW. ENTERING OFFLINE MODE..."; setTimeout(startGuestMode, 1500); } }, 4000);
    function attemptLogin() { try { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => startGuestMode()); } catch(e) { startGuestMode(); } }
    function startGuestMode() { if(loaded) return; user={uid:"GUEST",displayName:"Guest",email:"guest"}; document.getElementById('login-btn').style.display='none'; document.getElementById('user-display').style.display='flex'; document.getElementById('username').innerText="Guest"; document.getElementById('loader').style.display='none'; document.getElementById('game-ui').style.opacity='1'; loaded=true; render(); update(); }
    function checkAdmin() { if(user && ADMINS.includes(user.email)) { isAdmin=true; document.getElementById('tab-admin').style.display='block'; } }

    function render(){
        // SHOP
        document.getElementById('left-list').innerHTML=''; document.getElementById('right-list').innerHTML='';
        const ownedClick = items.filter(i => i.type==='click' && i.count > 0);
        const maxClickIdx = ownedClick.length > 0 ? Math.max(...ownedClick.map(i => i.idx)) : -1;
        const ownedAuto = items.filter(i => i.type==='auto' && i.count > 0);
        const maxAutoIdx = ownedAuto.length > 0 ? Math.max(...ownedAuto.map(i => i.idx)) : -1;

        items.sort((a,b)=>a.cost-b.cost).forEach(i=>{
            let show = false;
            if(i.count > 0) show = true;
            else if(i.type === 'click' && i.idx <= maxClickIdx + 1) show = true; 
            else if(i.type === 'auto' && i.idx <= maxAutoIdx + 2) show = true; 
            if(maxClickIdx === -1 && i.type === 'click' && i.idx === 0) show = true;
            if(maxAutoIdx === -1 && i.type === 'auto' && i.idx <= 1) show = true;
            if(show) {
                const b=i.type==='click'?`+${fmt(i.val)} Click`:`+${fmt(i.val)}/s`;
                const h=`<div class="card"><div><div style="font-weight:bold">${i.name} <span style="font-size:0.8rem; color:#666">Lvl ${i.count}</span></div><div style="font-size:0.8rem; color:#888">${b}</div></div><button class="buy-btn ${i.type==='click'?'click':''}" id="btn-${i.id}" onclick="buy(${i.id})">${fmt(i.cost)}</button></div>`;
                document.getElementById(i.type==='click'?'left-list':'right-list').innerHTML+=h;
            }
        });
        
        // MARKET
        const mList = document.getElementById('market-list'); mList.innerHTML='';
        marketItems.forEach(m => {
            mList.innerHTML += `<div class="card"><div><div style="font-weight:bold; color:#e67e22">${m.name}</div><div style="font-size:0.8rem; color:#aaa">${m.desc}</div></div><button class="buy-btn" id="btn-m-${m.id}" onclick="buyBuff('${m.id}')">${fmt(m.cost)}</button></div>`;
        });

        // ACH
        const abox = document.getElementById('view-ach'); abox.innerHTML='';
        achs.forEach(a => { abox.innerHTML+=`<div class="ach-card ${a.un? 'unlocked':''}"><div style="font-size:1.5rem">${a.un?'🏆':'🔒'}</div><div><b>${a.title}</b><br><span style="font-size:0.8rem; color:#888">Reach ${fmt(a.th)}</span></div></div>` });
    }

    window.buy=(id)=>{ const i=items.find(x=>x.id===id); if(score>=i.cost){ score-=i.cost; i.count++; i.cost=Math.ceil(i.cost*1.4); render(); update(); save(); } }
    
    // MARKET BUY
    window.buyBuff=(id)=>{
        const m = marketItems.find(x=>x.id===id);
        if(score >= m.cost) {
            score -= m.cost;
            showToast("Buff Activated: " + m.name, true);
            // Apply Buff
            const now = Date.now();
            buffs.active.push({ name: m.name, endAt: now + m.dur, type: m.type, mult: m.mult });
            update();
        }
    }

    document.getElementById('click-btn').addEventListener('mousedown',(e)=>{
        if(isOverheated) return;
        const now=Date.now(); clickHistory.push(now); clickHistory=clickHistory.filter(t=>now-t<1000);
        if(clickHistory.length>30){ isOverheated=true; document.getElementById('click-btn').classList.add('overheated'); showToast("⚠️ OVERHEAT!",false); setTimeout(()=>{isOverheated=false;document.getElementById('click-btn').classList.remove('overheated')},10000); return; }
        
        let p=(1+items.filter(i=>i.type==='click').reduce((a,b)=>a+(b.val*b.count),0))*(1+(prestige*0.1));
        p *= buffs.clickMult; // Apply Buff
        
        score+=p; lifetime+=p;
        const f=document.createElement('div'); f.className='floater'; f.innerText=`+${fmt(p)}`; f.style.left=e.clientX+'px'; f.style.top=(e.clientY-50)+'px'; document.body.appendChild(f); setTimeout(()=>f.remove(),800);
        const b=document.getElementById('click-btn'); b.style.transform='scale(0.95)'; setTimeout(()=>b.style.transform='scale(1)',50);
        update();
    });

    setInterval(()=>{
        let a=items.filter(i=>i.type==='auto').reduce((x,y)=>x+(y.val*y.count),0)*(1+(prestige*0.1));
        a *= buffs.autoMult; // Apply Buff
        if(a>0){ score+=a; lifetime+=a; update(); }
        if(currentPack && user && db) db.collection('parties').doc(currentPack).collection('members').doc(user.uid).set({name:user.displayName.split(' ')[0], score:score}, {merge:true});
        
        // Buff Cleanup
        const now = Date.now();
        buffs.active = buffs.active.filter(b => b.endAt > now);
        updateBuffs();
    },1000);
    setInterval(()=>{if(user)save()},30000);

    function updateBuffs() {
        // Reset Mults
        buffs.clickMult = 1; buffs.autoMult = 1;
        
        const bar = document.getElementById('buff-bar');
        bar.innerHTML = '';

        buffs.active.forEach(b => {
            if(b.type === 'click' || b.type === 'all') buffs.clickMult *= b.mult;
            if(b.type === 'auto' || b.type === 'all') buffs.autoMult *= b.mult;
            
            // Render Icon
            const timeLeft = Math.ceil((b.endAt - Date.now())/1000);
            bar.innerHTML += `<div class="buff-icon">${b.name} (${timeLeft}s)</div>`;
        });
    }

    function update(){
        document.getElementById('score').innerText=fmt(Math.floor(score));
        document.getElementById('cps-display').innerText=fmt(items.filter(i=>i.type==='auto').reduce((a,b)=>a+(b.val*b.count),0)*(1+prestige*0.1)*buffs.autoMult)+' / sec';
        document.getElementById('prestige-display').innerText=`Golden Bones: ${prestige} (+${Math.round(prestige*10)}%)`;
        document.getElementById('ascend-preview').innerText=`+${Math.floor(Math.sqrt(score/1e9))} Bones`;
        document.getElementById('ascend-btn').disabled=score<1e9;
        
        const btn=document.getElementById('click-btn');
        if(isOverheated) btn.classList.add('overheated');
        
        // Market Lock
        if(score >= 5e9 || items.some(i=>i.count>10)) {
            document.getElementById('market-locked').style.display='none';
            document.getElementById('market-unlocked').style.display='block';
        }

        items.forEach(i=>{const b=document.getElementById(`btn-${i.id}`); if(b)b.disabled=score<i.cost;});
        marketItems.forEach(m=>{const b=document.getElementById(`btn-m-${m.id}`); if(b)b.disabled=score<m.cost;});
        
        let nu=false; achs.forEach(a=>{ if(!a.un && lifetime>=a.th) { a.un=true; nu=true; showToast("🏆 UNLOCKED: "+a.title, true); } });
        if(nu) { render(); save(); }
    }

    // --- PACKS & CHAT ---
    window.createPack=()=>{ if(!user || !db)return alert("Offline"); const c=Math.floor(1000+Math.random()*9000).toString(); currentPack=c; setupPack(c); }
    window.joinPack=()=>{ if(!user || !db)return alert("Offline"); const c=document.getElementById('pack-code-input').value; if(c.length===4){ currentPack=c; setupPack(c); } }
    window.leavePack=()=>{ if(packListener)packListener(); currentPack=null; document.getElementById('pack-active').style.display='none'; document.getElementById('pack-lobby').style.display='block'; }
    function setupPack(c){
        document.getElementById('pack-lobby').style.display='none'; document.getElementById('pack-active').style.display='block'; document.getElementById('display-code').innerText=c;
        packListener = db.collection('parties').doc(c).collection('members').onSnapshot(s=>{
            const l=document.getElementById('pack-list'); l.innerHTML='';
            s.forEach(d=>{ const dat=d.data(); l.innerHTML+=`<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #444;"><span>${dat.name}</span><span style="color:#ffd700">${fmt(dat.score)}</span></div>`; });
        });
    }
    function initChat(){
        if(!db) return document.getElementById('chat-feed').innerHTML="Offline Mode";
        db.collection('messages').orderBy('time','desc').limit(15).onSnapshot(s=>{
            const f=document.getElementById('chat-feed'); f.innerHTML=''; let m=[]; s.forEach(d=>m.push({...d.data(), id:d.id}));
            m.reverse().forEach(x=>{ f.innerHTML+=`<div class="chat-msg" onclick="showUserModal('${x.name}', '${x.uid}')"><span class="chat-name">${x.name}:</span> <span style="color:#ddd">${x.text}</span></div>`; });
            f.scrollTop=f.scrollHeight;
        });
    }
    window.sendBark=()=>{ const t=document.getElementById('chat-input').value; if(!user||!t||!db)return; db.collection('messages').add({name:user.displayName.split(' ')[0], uid:user.uid, text:t, time:Date.now()}); document.getElementById('chat-input').value=''; }
    
    // --- USER MODAL ---
    window.showUserModal=(n,u)=>{ document.getElementById('user-modal').style.display='flex'; document.getElementById('modal-name').innerText=n; document.getElementById('modal-uid').value=u; }
    window.copyID=()=>{ navigator.clipboard.writeText(document.getElementById('modal-uid').value); showToast("ID Copied!", true); if(isAdmin)document.getElementById('admin-target').value=document.getElementById('modal-uid').value; }

    // --- ADMIN ---
    window.adminAction=(a)=>{
        if(!isAdmin||!db)return; const t=document.getElementById('admin-target').value; if(!t)return alert("No ID");
        if(a==='ban') db.collection('players').doc(t).delete();
        if(a==='setScore') db.collection('players').doc(t).update({score: parseInt(document.getElementById('admin-score-val').value)});
    }

    window.googleLogout = () => auth.signOut();
    function save(){ if(!user || !loaded || !db)return; db.collection('players').doc(user.uid).set({name:user.displayName, score, lifetime, prestige, items:JSON.stringify(items), lastActive:Date.now()}, {merge:true}); }
    function load(){ 
        if(!db) { loaded=true; render(); update(); return; }
        db.collection('players').doc(user.uid).get().then(d=>{ 
            if(d.exists){ 
                const data=d.data(); score=data.score||0; lifetime=data.lifetime||0; prestige=data.prestige||0; 
                if(data.items){ const sv=JSON.parse(data.items); sv.forEach(s=>{ const l=items.find(x=>x.id===s.id); if(l){l.count=s.count;l.cost=s.cost;} }); }
            }
            loaded=true; document.getElementById('loader').style.display='none'; document.getElementById('game-ui').style.opacity='1'; render(); update(); 
        }); 
    }
    window.ascend=()=>{ if(score<1e9 || !confirm("Reset?"))return; prestige+=Math.floor(Math.sqrt(score/1e9)); score=0; items.forEach(i=>{i.count=0;i.cost=50}); save(); location.reload(); }
    window.setTab=(t)=>{ ['shop','market','park','pack','ach','asc','admin'].forEach(x=>document.getElementById(`view-${x}`).style.display='none'); document.getElementById(`view-${t}`).style.display=t==='park'?'flex':'block'; ['shop','market','park','pack','ach','asc','admin'].forEach(x=>document.getElementById(`tab-${x}`).className=x==='admin'?'tab-btn admin':'tab-btn'); document.getElementById(`tab-${t}`).className+= ' active'; }
    function fmt(n){ if(n>=1e21)return (n/1e21).toFixed(2)+'Sx'; if(n>=1e18)return (n/1e18).toFixed(2)+'Qi'; if(n>=1e15)return (n/1e15).toFixed(2)+'Qa'; if(n>=1e12)return (n/1e12).toFixed(2)+'T'; if(n>=1e9)return (n/1e9).toFixed(2)+'B'; if(n>=1e6)return (n/1e6).toFixed(2)+'M'; if(n>=1e3)return (n/1e3).toFixed(2)+'k'; return Math.floor(n).toLocaleString(); }
    function showToast(m,s){ const t=document.getElementById('toast'); t.innerText=m; t.className=s?'toast success show':'toast show'; setTimeout(()=>t.classList.remove('show'),3000); }
    
    render(); update();
</script>
</body>
</html>
