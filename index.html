<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doggy Clicker V35 (Stable Load)</title>
    
    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #1a1a1a; --panel: #2a2a2a; 
            --primary: #ffd700; --success: #2ecc71; --text: #ffffff; 
            --muted: #bdc3c7; --accent: #e67e22; --danger: #ff4757;
            --admin: #8e44ad;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; user-select: none;}
        
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at bottom, #2c3e50 0%, #000000 100%); }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 0.5s; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .dashboard { display: grid; grid-template-columns: 320px 1fr 380px; height: 100vh; width: 100%; opacity: 0; transition: opacity 1s; }
        .panel { background: var(--panel); display: flex; flex-direction: column; border-right: 2px solid #444; height: 100vh; overflow: hidden; }
        .panel-right { border-right: none; border-left: 2px solid #444; }
        .panel-header { padding: 20px; border-bottom: 2px solid #444; background: #222; z-index: 5; }
        .panel-content { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: #555 #222; }
        .panel-content::-webkit-scrollbar { width: 8px; }
        .panel-content::-webkit-scrollbar-track { background: #222; }
        .panel-content::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        .panel-title { color: var(--muted); font-weight: 800; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }

        .center-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: radial-gradient(circle at center, rgba(50, 50, 50, 0.3) 0%, rgba(10, 10, 10, 0.8) 80%); }
        .score-container { position: absolute; top: 8%; text-align: center; z-index: 10; pointer-events: none; width: 100%; }
        .score-lbl { color: var(--primary); font-size: 1.1rem; letter-spacing: 4px; font-weight: 900; text-transform: uppercase; margin-bottom: 0px; text-shadow: 0 2px 10px rgba(0,0,0,1); }
        #score { font-size: 5.5rem; font-weight: 900; color: white; text-shadow: 0 0 10px var(--primary), 0 0 30px black; margin: -5px 0; line-height: 1; letter-spacing: -2px; }
        #cps-display { color: var(--success); font-size: 1.5rem; font-weight: 800; margin-top: -5px; text-shadow: 0 2px 5px black; }
        #prestige-display { font-size: 1rem; color: var(--primary); margin-top: 10px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--primary); display: inline-block; }

        .orb-wrapper { position: relative; width: 450px; height: 450px; display: flex; justify-content: center; align-items: center; margin-top: 40px; }
        .halo-container { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 5; animation: rotateHalo 60s linear infinite; }
        .halo-paw { position: absolute; font-size: 14px; color: white; text-shadow: 0 0 5px var(--primary); transform: rotate(90deg); }
        @keyframes rotateHalo { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #click-btn { width: 300px; height: 300px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.05s, box-shadow 0.5s; position: relative; z-index: 10; background-size: cover; background-position: center; }
        #click-btn:active { transform: scale(0.96); }
        .stage-0 { background: radial-gradient(circle at 30% 30%, #bdc3c7, #7f8c8d); box-shadow: 0 0 60px rgba(189, 195, 199, 0.4); } 
        .stage-5 { background-image: url('https://images.unsplash.com/photo-1543466835-00a7907e9de1?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80'); box-shadow: 0 0 150px rgba(255, 255, 255, 0.8); border: 4px solid white; }
        #click-btn.overheated { background: repeating-linear-gradient(45deg, #d63031, #d63031 10px, #c0392b 10px, #c0392b 20px) !important; box-shadow: 0 0 0 10px #d63031 !important; cursor: not-allowed; }

        .tab-group { display:flex; gap:5px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tab-btn { background:transparent; border:none; color:#777; font-weight:bold; cursor:pointer; padding: 5px 8px; font-size: 0.75rem; border-radius: 4px; white-space: nowrap; }
        .tab-btn.active { color: #000; background: var(--primary); }
        .tab-btn.admin { color: white; background: var(--admin); }

        .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: var(--success); color: #000; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; min-width: 90px; }
        .buy-btn:disabled { background: #444; color: #777; cursor: not-allowed; }
        .ach-card { background: #222; border: 1px solid #444; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; opacity: 0.5; }
        .ach-card.unlocked { opacity: 1; border-color: var(--primary); background: rgba(241, 196, 15, 0.1); }
        
        .auth-box { position: absolute; top: 20px; right: 20px; z-index: 20; display:flex; gap:10px; }
        .floater { position: absolute; color: #fff; font-weight: 900; font-size: 2rem; pointer-events: none; animation: float 0.8s ease-out forwards; text-shadow: 0 0 10px var(--primary); z-index: 100; }
        @keyframes float { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-80px); opacity: 0; } }

        /* PACK & CHAT UI */
        .pack-box { padding: 20px; background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 8px; text-align: center; }
        .pack-code { font-size: 2rem; font-weight: 900; color: var(--primary); letter-spacing: 5px; margin: 15px 0; background: #000; padding: 10px; border-radius: 4px; border: 1px dashed #666; }
        .chat-box { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex: 1; overflow-y: auto; font-size: 0.85rem; padding-right: 5px; }
        .chat-msg { margin-bottom: 5px; padding: 5px; background: rgba(0,0,0,0.3); border-radius: 4px; cursor: pointer; }
        .chat-msg:hover { background: rgba(255,255,255,0.1); }
        .chat-name { font-weight: bold; color: var(--primary); margin-right: 5px; }
        .chat-input { background: #333; border: 1px solid #555; color: white; padding: 8px; width: 100%; box-sizing: border-box; margin-top: 5px; }

        /* MAIL & ADMIN UI */
        .mail-item { background: #333; padding: 10px; border-left: 3px solid var(--accent); margin-bottom: 5px; }
        .admin-box { border: 2px solid var(--admin); padding: 10px; margin-bottom: 10px; background: rgba(142, 68, 173, 0.1); }
        .admin-input { background: #000; color: #fff; border: 1px solid #666; padding: 5px; width: 100%; margin-bottom: 5px; }
        .admin-btn { background: var(--admin); color: white; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; width: 100%; }
        
        .toast { position: fixed; bottom: 30px; right: 30px; background: var(--danger); color: white; padding: 15px 25px; border-radius: 8px; font-weight: bold; transform: translateY(100px); opacity: 0; transition: all 0.5s; z-index: 200; }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>
    <div id="loader"><div class="spinner"></div><div id="loader-msg" style="color:#888; font-weight:bold;">WAKING THE PACK...</div></div>

    <div class="dashboard" id="game-ui">
        <!-- LEFT PANEL -->
        <div class="panel">
            <div class="panel-header"><div class="panel-title">Training</div></div>
            <div class="panel-content" id="left-list"></div>
        </div>

        <!-- CENTER STAGE -->
        <div class="center-stage">
            <div class="auth-box">
                <button id="login-btn" onclick="attemptLogin()">Login / Guest Mode</button>
                <div id="user-display" style="display:none; background:#333; padding:5px 15px; border-radius:20px; align-items:center; gap:10px;">
                    <span id="username">Handler</span>
                    <button onclick="googleLogout()" style="background:none; border:none; color:#aaa; cursor:pointer;">(Sign Out)</button>
                </div>
            </div>

            <div class="score-container">
                <div class="score-lbl">Doggy Treats</div>
                <div id="score">0</div>
                <div id="cps-display">0 / sec</div>
                <div id="prestige-display">Golden Bones: 0 (+0%)</div>
            </div>

            <div class="orb-wrapper">
                <div class="halo-container" id="halo"></div>
                <button id="click-btn" class="stage-0"></button>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="panel panel-right">
            <div class="panel-header">
                <div class="panel-title">
                    <div class="tab-group">
                        <button class="tab-btn active" id="tab-shop" onclick="setTab('shop')">SHOP</button>
                        <button class="tab-btn" id="tab-park" onclick="setTab('park')">PARK</button>
                        <button class="tab-btn" id="tab-mail" onclick="setTab('mail')">MAIL</button>
                        <button class="tab-btn" id="tab-pack" onclick="setTab('pack')">PACK</button>
                        <button class="tab-btn" id="tab-lb" onclick="setTab('lb')">TOP</button>
                        <button class="tab-btn" id="tab-asc" onclick="setTab('asc')">ASCEND</button>
                        <button class="tab-btn admin" id="tab-admin" onclick="setTab('admin')" style="display:none;">GOD</button>
                    </div>
                </div>
            </div>
            
            <div class="panel-content">
                <!-- SHOP -->
                <div id="view-shop"><div id="right-list"></div></div>
                
                <!-- PARK (CHAT) -->
                <div id="view-park" style="display:none; height:100%;">
                    <div class="chat-box">
                        <div style="font-size:0.8rem; color:#aaa; text-align:center; padding:5px;">Click a name to Message/Admin</div>
                        <div class="chat-messages" id="chat-feed">Connecting...</div>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <input type="text" id="chat-input" class="chat-input" placeholder="Type bark...">
                            <button onclick="sendBark()" style="background:#333; color:white; border:1px solid #555;">➤</button>
                        </div>
                    </div>
                </div>

                <!-- MAIL (DMs) -->
                <div id="view-mail" style="display:none;">
                    <div style="text-align:center; margin-bottom:10px; font-weight:bold; color:var(--accent)">INBOX</div>
                    <div id="mail-list"></div>
                </div>

                <!-- PACK -->
                <div id="view-pack" style="display:none;">
                    <div id="pack-lobby">
                        <div class="pack-box">
                            <div style="font-weight:bold; margin-bottom:10px;">JOIN PACK</div>
                            <input type="text" id="pack-code-input" class="admin-input" placeholder="4-Digit Code" maxlength="4" style="text-align:center; font-size:1.5rem;">
                            <button class="buy-btn" onclick="joinPack()">JOIN</button>
                            <div style="margin:20px 0; color:#666;">- OR -</div>
                            <button class="buy-btn click" style="width:100%" onclick="createPack()">CREATE NEW</button>
                        </div>
                    </div>
                    <div id="pack-active" style="display:none;">
                        <div class="pack-box">
                            <div style="color:#aaa; font-size:0.8rem;">CODE</div>
                            <div class="pack-code" id="display-code">----</div>
                            <button onclick="leavePack()" style="color:#f00; background:none; border:none; cursor:pointer;">Leave</button>
                        </div>
                        <div style="margin-top:20px; font-weight:bold;">MEMBERS</div>
                        <div id="pack-list"></div>
                    </div>
                </div>

                <!-- LEADERBOARD -->
                <div id="view-lb" style="display:none;">Loading...</div>

                <!-- ASCEND -->
                <div id="view-asc" style="display:none; text-align:center;">
                    <div style="color:#ddd; margin:20px 0;">Reset for <b>Golden Bones</b>.<br>Bone = <b>+10%</b> Prod.</div>
                    <div style="font-size:3rem;">🦴</div>
                    <div id="ascend-preview" style="font-size:1.2rem; font-weight:bold; margin:10px 0;">+0 Bones</div>
                    <button id="ascend-btn" onclick="ascend()" style="background:#d32f2f; color:white; padding:15px; width:100%; border:none; border-radius:5px; font-weight:bold;" disabled>ASCEND (Need 1B)</button>
                </div>

                <!-- ADMIN (GOD MODE) -->
                <div id="view-admin" style="display:none;">
                    <div class="admin-box">
                        <div style="color:var(--admin); font-weight:bold;">TARGET PLAYER ID</div>
                        <input type="text" id="admin-target" class="admin-input" placeholder="Paste User ID here...">
                    </div>
                    <div class="admin-box">
                        <button class="admin-btn" onclick="adminAction('ban')">BAN PLAYER (DELETE)</button>
                    </div>
                    <div class="admin-box">
                        <div style="color:var(--admin)">SET SCORE</div>
                        <input type="number" id="admin-score-val" class="admin-input" placeholder="Amount">
                        <button class="admin-btn" onclick="adminAction('setScore')">APPLY</button>
                    </div>
                    <div class="admin-box">
                        <div style="color:var(--admin)">BROADCAST MSG</div>
                        <input type="text" id="admin-msg" class="admin-input" placeholder="Message">
                        <button class="admin-btn" onclick="adminAction('broadcast')">SEND SYSTEM ALERT</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- MODAL FOR USER ACTIONS -->
    <div id="user-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:#222; padding:20px; border-radius:8px; border:1px solid #444; width:300px;">
            <h3 id="modal-name" style="margin-top:0; color:var(--primary);">User</h3>
            <input type="hidden" id="modal-uid">
            <button onclick="copyID()" style="width:100%; padding:10px; margin-bottom:5px;">Copy ID (For Admin)</button>
            <button onclick="openDmUI()" style="width:100%; padding:10px; margin-bottom:5px; background:var(--accent); color:white; border:none;">Send Mail</button>
            <button onclick="document.getElementById('user-modal').style.display='none'" style="width:100%; padding:10px; background:#444; color:white; border:none;">Close</button>
        </div>
    </div>
    
    <!-- DM SEND UI -->
    <div id="dm-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center;">
        <div style="background:#222; padding:20px; border-radius:8px; border:1px solid #444; width:300px;">
            <h3>Send Message</h3>
            <input type="text" id="dm-content" class="admin-input" placeholder="Type message or code...">
            <button onclick="sendDM()" class="buy-btn click" style="width:100%">SEND</button>
            <button onclick="document.getElementById('dm-modal').style.display='none'" style="width:100%; padding:10px; margin-top:5px; background:none; border:none; color:#aaa;">Cancel</button>
        </div>
    </div>

    <div id="toast" class="toast">Note</div>

<script>
    // --- GRAPHICS ---
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let width, height, stars=[];
    function resize() { width=canvas.width=window.innerWidth; height=canvas.height=window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    function drawPaw(ctx,x,y,s,c,a){ ctx.fillStyle=c; ctx.globalAlpha=a; ctx.beginPath(); ctx.ellipse(x,y,s,s*0.8,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x-s,y-s*1.2+(s*0.3),s*0.35,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x,y-s*1.2,s*0.35,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+s,y-s*1.2+(s*0.3),s*0.35,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1.0; }
    class Star { constructor(){this.reset();} reset(){this.x=Math.random()*width; this.y=Math.random()*height; this.z=Math.random()*3+1; this.s=Math.random()*4+3; this.a=Math.random()*0.5+0.3; this.g=Math.random()>0.8;} update(){this.y-=this.z*0.3; if(this.y<-20)this.reset();} draw(){drawPaw(ctx,this.x,this.y,this.s,this.g?"#f1c40f":"#ffffff",this.a);} }
    for(let i=0;i<80;i++) stars.push(new Star());
    function anim(){ ctx.clearRect(0,0,width,height); stars.forEach(s=>{s.update();s.draw()}); requestAnimationFrame(anim); }
    anim();
    const halo=document.getElementById('halo'); for(let i=0;i<24;i++){ const el=document.createElement('div'); el.className='halo-paw'; el.innerText='🐾'; const a=Math.random()*Math.PI*2, d=180+Math.random()*40; el.style.left=(225+Math.cos(a)*d)+'px'; el.style.top=(225+Math.sin(a)*d)+'px'; halo.appendChild(el); }

    // --- CONFIG ---
    const firebaseConfig = { apiKey: "AIzaSyCQ_t-pRJwwUcA3ywRjVdx-4WZhT9C4e6k", authDomain: "cosmic-clicker-snoopy152803.firebaseapp.com", projectId: "cosmic-clicker-snoopy152803", storageBucket: "cosmic-clicker-snoopy152803.firebasestorage.app", messagingSenderId: "319238837766", appId: "1:319238837766:web:071d9d5fc958551d559587", measurementId: "G-ZEPLY7XE8B" };
    
    // *** ADMIN EMAIL *** (Line 326)
    const ADMINS = ["your-email@gmail.com"]; 

    let db, auth, user=null, loaded=false, isAdmin=false;
    let score=0, lifetime=0, prestige=0;
    let currentPack=null, packListener=null;
    let clickHistory=[], isOverheated=false;

    let items = [
        { id: 0, name: "Scritches", cost: 50, val: 1, type: "click", count: 0 },
        { id: 3, name: "Belly Rub", cost: 500, val: 10, type: "click", count: 0 },
        { id: 30, name: "Squeaky Toy", cost: 2500, val: 50, type: "click", count: 0 }, 
        { id: 31, name: "Fancy Collar", cost: 12000, val: 150, type: "click", count: 0 }, 
        { id: 32, name: "Agility Course", cost: 1000000, val: 15000, type: "click", count: 0 }, 
        { id: 10, name: "Golden Leash", cost: 5e6, val: 50000, type: "click", count: 0 },
        { id: 1, name: "Auto-Petter", cost: 15, val: 1, type: "auto", count: 0 },
        { id: 2, name: "Neighbor Kid", cost: 100, val: 5, type: "auto", count: 0 },
        { id: 4, name: "Dog Walker", cost: 1000, val: 50, type: "auto", count: 0 },
        { id: 6, name: "Dog Park", cost: 5000, val: 150, type: "auto", count: 0 },
        { id: 5, name: "K9 Unit", cost: 25000, val: 500, type: "auto", count: 0 },
        { id: 33, name: "Dog House", cost: 150000, val: 2000, type: "auto", count: 0 }, 
        { id: 9, name: "Wolf Pack", cost: 1e6, val: 10000, type: "auto", count: 0 },
        { id: 20, name: "Treat Factory", cost: 2e8, val: 500000, type: "auto", count: 0 },
        { id: 26, name: "Planet of Dogs", cost: 4e12, val: 15000000000, type: "auto", count: 0 }
    ];

    if(typeof firebase!=='undefined'){ try{firebase.initializeApp(firebaseConfig); db=firebase.firestore(); auth=firebase.auth(); auth.onAuthStateChanged(u=>{ if(u){ user=u; document.getElementById('login-btn').style.display='none'; document.getElementById('user-display').style.display='flex'; document.getElementById('username').innerText=u.displayName.split(' ')[0]; checkAdmin(); load(); initChat(); initMail(); } else { document.getElementById('loader').style.display='none'; document.getElementById('game-ui').style.opacity='1'; } }); }catch(e){console.error(e);} }

    // --- SAFETY TIMEOUT: Force Load if Database is Stuck ---
    setTimeout(() => {
        if(document.getElementById('loader').style.display !== 'none') {
            document.getElementById('loader-msg').innerText = "CONNECTION SLOW. ENTERING OFFLINE MODE...";
            setTimeout(startGuestMode, 1500);
        }
    }, 4000);

    function attemptLogin() {
        try {
            const p = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(p).catch(e => startGuestMode());
        } catch(e) { startGuestMode(); }
    }
    
    function startGuestMode() {
        if(loaded) return; 
        user = { uid: "GUEST_"+Math.floor(Math.random()*9999), displayName: "Guest", email: "guest@dog.com" };
        document.getElementById('login-btn').style.display='none';
        document.getElementById('user-display').style.display='flex';
        document.getElementById('username').innerText="Guest";
        document.getElementById('loader').style.display='none';
        document.getElementById('game-ui').style.opacity='1';
        loaded=true;
        render(); update();
        showToast("Started in Offline Mode", false);
    }

    function checkAdmin() {
        if(user && ADMINS.includes(user.email)) {
            isAdmin = true;
            document.getElementById('tab-admin').style.display = 'block';
        }
    }

    function render(){
        document.getElementById('left-list').innerHTML=''; document.getElementById('right-list').innerHTML='';
        items.sort((a,b)=>a.cost-b.cost).forEach(i=>{
            const b=i.type==='click'?`+${fmt(i.val)} Click`:`+${fmt(i.val)}/s`;
            const h=`<div class="card"><div><div style="font-weight:bold">${i.name} <span style="font-size:0.8rem; color:#666">Lvl ${i.count}</span></div><div style="font-size:0.8rem; color:#888">${b}</div></div><button class="buy-btn ${i.type==='click'?'click':''}" id="btn-${i.id}" onclick="buy(${i.id})">${fmt(i.cost)}</button></div>`;
            document.getElementById(i.type==='click'?'left-list':'right-list').innerHTML+=h;
        });
    }

    window.buy=(id)=>{ const i=items.find(x=>x.id===id); if(score>=i.cost){ score-=i.cost; i.count++; i.cost=Math.ceil(i.cost*1.4); render(); update(); save(); } }

    document.getElementById('click-btn').addEventListener('mousedown',(e)=>{
        if(isOverheated) return;
        const now=Date.now(); clickHistory.push(now); clickHistory=clickHistory.filter(t=>now-t<1000);
        if(clickHistory.length>30){ isOverheated=true; document.getElementById('click-btn').classList.add('overheated'); showToast("⚠️ OVERHEAT! (10s)",false); setTimeout(()=>{isOverheated=false;document.getElementById('click-btn').classList.remove('overheated')},10000); return; }
        
        let p=(1+items.filter(i=>i.type==='click').reduce((a,b)=>a+(b.val*b.count),0))*(1+(prestige*0.1));
        score+=p; lifetime+=p;
        const f=document.createElement('div'); f.className='floater'; f.innerText=`+${fmt(p)}`; f.style.left=e.clientX+'px'; f.style.top=(e.clientY-50)+'px'; document.body.appendChild(f); setTimeout(()=>f.remove(),800);
        const b=document.getElementById('click-btn'); b.style.transform='scale(0.95)'; setTimeout(()=>b.style.transform='scale(1)',50);
        update();
    });

    setInterval(()=>{
        let a=items.filter(i=>i.type==='auto').reduce((x,y)=>x+(y.val*y.count),0)*(1+(prestige*0.1));
        if(a>0){ score+=a; lifetime+=a; update(); }
        if(currentPack && user && db) db.collection('parties').doc(currentPack).collection('members').doc(user.uid).set({name:user.displayName.split(' ')[0], score:score}, {merge:true});
    },1000);
    setInterval(()=>{if(user)save()},30000);

    function update(){
        document.getElementById('score').innerText=fmt(Math.floor(score));
        document.getElementById('cps-display').innerText=fmt(items.filter(i=>i.type==='auto').reduce((a,b)=>a+(b.val*b.count),0)*(1+prestige*0.1))+' / sec';
        document.getElementById('prestige-display').innerText=`Golden Bones: ${prestige} (+${Math.round(prestige*10)}%)`;
        document.getElementById('ascend-preview').innerText=`+${Math.floor(Math.sqrt(score/1e9))} Bones`;
        document.getElementById('ascend-btn').disabled=score<1e9;
        
        const btn=document.getElementById('click-btn'); btn.className='';
        if(score>5e8) btn.classList.add('stage-5'); else if(score>10000) btn.classList.add('stage-0');
        if(isOverheated) btn.classList.add('overheated');
        items.forEach(i=>{const b=document.getElementById(`btn-${i.id}`); if(b)b.disabled=score<i.cost;});
    }

    // --- PACKS ---
    window.createPack=()=>{ if(!user || !db)return alert("Offline"); const c=Math.floor(1000+Math.random()*9000).toString(); currentPack=c; setupPack(c); }
    window.joinPack=()=>{ if(!user || !db)return alert("Offline"); const c=document.getElementById('pack-code-input').value; if(c.length===4){ currentPack=c; setupPack(c); } }
    window.leavePack=()=>{ if(packListener)packListener(); currentPack=null; document.getElementById('pack-active').style.display='none'; document.getElementById('pack-lobby').style.display='block'; }
    function setupPack(c){
        document.getElementById('pack-lobby').style.display='none'; document.getElementById('pack-active').style.display='block'; document.getElementById('display-code').innerText=c;
        packListener = db.collection('parties').doc(c).collection('members').onSnapshot(s=>{
            const l=document.getElementById('pack-list'); l.innerHTML='';
            s.forEach(d=>{ const dat=d.data(); l.innerHTML+=`<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #444;"><span>${dat.name}</span><span style="color:#ffd700">${fmt(dat.score)}</span></div>`; });
        });
    }

    // --- CHAT & USER INTERACTION ---
    function initChat(){
        if(!db) return document.getElementById('chat-feed').innerHTML="Offline Mode";
        db.collection('messages').orderBy('time','desc').limit(15).onSnapshot(s=>{
            const f=document.getElementById('chat-feed'); f.innerHTML=''; let m=[]; s.forEach(d=>m.push({...d.data(), id:d.id}));
            m.reverse().forEach(x=>{
                f.innerHTML+=`<div class="chat-msg" onclick="showUserModal('${x.name}', '${x.uid}')"><span class="chat-name">${x.name}:</span> <span style="color:#ddd">${x.text}</span></div>`;
            });
            f.scrollTop=f.scrollHeight;
        });
    }
    window.sendBark=()=>{ 
        const txt=document.getElementById('chat-input').value; if(!user || !txt || !db) return;
        db.collection('messages').add({name:user.displayName.split(' ')[0], uid:user.uid, text:txt, time:Date.now()});
        document.getElementById('chat-input').value='';
    }
    
    // --- USER MODAL & MAIL ---
    window.showUserModal=(name, uid)=>{
        document.getElementById('user-modal').style.display='flex';
        document.getElementById('modal-name').innerText = name;
        document.getElementById('modal-uid').value = uid;
    }
    window.copyID=()=>{
        const uid = document.getElementById('modal-uid').value;
        navigator.clipboard.writeText(uid);
        showToast("ID Copied!", true);
        if(isAdmin) document.getElementById('admin-target').value = uid;
    }
    window.openDmUI=()=>{
        document.getElementById('user-modal').style.display='none';
        document.getElementById('dm-modal').style.display='flex';
    }
    window.sendDM=()=>{
        const uid = document.getElementById('modal-uid').value;
        const txt = document.getElementById('dm-content').value;
        if(db) db.collection('mail').add({ to: uid, from: user.displayName, text: txt, time: Date.now() });
        document.getElementById('dm-modal').style.display='none';
        showToast("Mail Sent!", true);
    }
    function initMail(){
        if(!db) return;
        db.collection('mail').where('to','==',user.uid).onSnapshot(s=>{
            const list = document.getElementById('mail-list'); list.innerHTML='';
            if(s.empty) list.innerHTML = "<div style='color:#666; text-align:center'>No mail yet.</div>";
            s.forEach(d=>{
                const m=d.data();
                list.innerHTML += `<div class="mail-item"><div><b>From: ${m.from}</b></div><div>${m.text}</div></div>`;
            });
        });
    }

    // --- ADMIN ACTIONS ---
    window.adminAction = (action) => {
        if(!isAdmin || !db) return;
        const target = document.getElementById('admin-target').value;
        if(!target) return alert("Need Target ID");

        if(action === 'ban') {
            db.collection('players').doc(target).delete().then(()=>alert("User Deleted/Banned"));
        }
        if(action === 'setScore') {
            const val = parseInt(document.getElementById('admin-score-val').value);
            db.collection('players').doc(target).update({score: val}).then(()=>alert("Score Updated"));
        }
        if(action === 'broadcast') {
            const msg = document.getElementById('admin-msg').value;
            db.collection('messages').add({name:"SYSTEM", uid:"ADMIN", text:msg, time:Date.now()});
        }
    }

    // --- CORE ---
    window.googleLogin = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
    window.googleLogout = () => auth.signOut();
    function save(){ if(!user || !loaded || !db)return; db.collection('players').doc(user.uid).set({name:user.displayName, score, lifetime, prestige, items:JSON.stringify(items), lastActive:Date.now()}, {merge:true}); }
    function load(){ 
        if(!db) { loaded=true; render(); update(); return; }
        db.collection('players').doc(user.uid).get().then(d=>{ 
            if(d.exists){ 
                const data=d.data(); score=data.score||0; lifetime=data.lifetime||0; prestige=data.prestige||0; 
                if(data.items){ const sv=JSON.parse(data.items); sv.forEach(s=>{ const l=items.find(x=>x.id===s.id); if(l){l.count=s.count;l.cost=s.cost;} }); }
            }
            loaded=true; document.getElementById('loader').style.display='none'; document.getElementById('game-ui').style.opacity='1'; render(); update(); 
        }); 
    }
    
    window.ascend=()=>{ if(score<1e9 || !confirm("Reset?"))return; prestige+=Math.floor(Math.sqrt(score/1e9)); score=0; items.forEach(i=>{i.count=0;i.cost=50}); save(); location.reload(); }
    
    window.setTab=(t)=>{ ['shop','park','mail','pack','lb','asc','admin'].forEach(x=>document.getElementById(`view-${x}`).style.display='none'); document.getElementById(`view-${t}`).style.display=t==='park'?'flex':'block'; ['shop','park','mail','pack','lb','asc','admin'].forEach(x=>document.getElementById(`tab-${x}`).className=x==='admin'?'tab-btn admin':'tab-btn'); document.getElementById(`tab-${t}`).className+= ' active'; if(t==='lb')loadLB(); }
    
    function loadLB(){ const b=document.getElementById('view-lb'); b.innerHTML='Loading...'; if(!db) return b.innerHTML="Offline"; db.collection('players').orderBy('score','desc').limit(10).get().then(s=>{ b.innerHTML=''; let r=1; s.forEach(d=>{ const p=d.data(); b.innerHTML+=`<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #444;"><span style="color:var(--primary)">#${r++}</span><span>${p.name.split(' ')[0]}</span><span style="color:#fff">${fmt(p.score)}</span></div>`; }); }); }

    function fmt(n){ if(n>=1e9)return (n/1e9).toFixed(2)+'B'; if(n>=1e6)return (n/1e6).toFixed(2)+'M'; if(n>=1e3)return (n/1e3).toFixed(2)+'k'; return Math.floor(n).toLocaleString(); }
    function showToast(m,s){ const t=document.getElementById('toast'); t.innerText=m; t.className=s?'toast success show':'toast show'; setTimeout(()=>t.classList.remove('show'),3000); }
    
    render(); update();
</script>
</body>
</html>
